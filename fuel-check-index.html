<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fuel Check™ — Coach Paris</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF6F1;--mauve-dark:#5D4251;--mauve-mid:#9B6F85;--mauve-light:#D6BECB;--mauve-pale:#F5EEF1;
  --text-dark:#271A22;--text-mid:#382A32;--text-light:#594750;
  --green:#4a7a5c;--green-pale:#edf4ef;
  --yellow:#9e703e;--yellow-pale:#faf3e8;
  --red:#7a5c6e;--red-pale:#f5eef2;
  --amber:#8a6a3a;--amber-pale:#faf3e4;
}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'Montserrat',sans-serif;font-weight:300;color:var(--text-dark);padding:0;margin:0}
.hero{background:var(--mauve-pale);border-bottom:1px solid var(--mauve-light);padding:48px 24px 36px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;left:0;top:0;width:5px;height:100%;background:var(--mauve-dark)}
.hero-eyebrow{font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--mauve-mid);margin-bottom:12px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(26px,6vw,42px);font-weight:700;color:var(--mauve-dark);line-height:1.15;margin-bottom:10px}
.hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(14px,3vw,17px);color:var(--text-light);max-width:460px;margin:0 auto;line-height:1.5}
.container{max-width:620px;margin:0 auto;padding:36px 20px 60px}
.progress-wrap{margin-bottom:28px}
.progress-label{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-label span{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-light)}
.progress-bar-bg{height:4px;background:var(--mauve-light);border-radius:2px}
.progress-bar-fill{height:4px;background:var(--mauve-dark);border-radius:2px;transition:width 0.3s ease;width:0%}
.question-card{background:#fff;border:1px solid var(--mauve-light);border-radius:14px;padding:24px 20px 20px;margin-bottom:16px;animation:fadeUp 0.35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--mauve-mid);margin-bottom:8px}
.q-text{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--mauve-dark);margin-bottom:16px;line-height:1.4}
.q-note{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--text-light);margin-bottom:14px;margin-top:-8px}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--mauve-light);border-radius:10px;cursor:pointer;transition:all 0.15s;background:#fff}
.option:hover{border-color:var(--mauve-mid);background:var(--mauve-pale)}
.option.selected{border-color:var(--mauve-dark);background:var(--mauve-pale)}
.option-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--mauve-light);flex-shrink:0;transition:all 0.15s}
.option.selected .option-dot{background:var(--mauve-dark);border-color:var(--mauve-dark)}
.option-text{font-size:13px;font-weight:400;color:var(--text-mid)}
.multi-note{font-size:10px;color:var(--text-light);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.checkbox-option{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--mauve-light);border-radius:10px;cursor:pointer;transition:all 0.15s;background:#fff;margin-bottom:7px}
.checkbox-option:hover{border-color:var(--mauve-mid);background:var(--mauve-pale)}
.checkbox-option.selected{border-color:var(--mauve-dark);background:var(--mauve-pale)}
.checkbox-box{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--mauve-light);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.checkbox-option.selected .checkbox-box{background:var(--mauve-dark);border-color:var(--mauve-dark)}
.checkmark{width:8px;height:8px;background:#fff;clip-path:polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%);display:none}
.checkbox-option.selected .checkmark{display:block}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.btn{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;padding:12px 28px;border-radius:40px;cursor:pointer;transition:all 0.2s;border:1px solid var(--mauve-dark)}
.btn-primary{background:var(--mauve-dark);color:#fff}
.btn-primary:hover{background:#4a3040}
.btn-secondary{background:transparent;color:var(--mauve-dark)}
.btn-secondary:hover{background:var(--mauve-pale)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.result-card{background:#fff;border:1px solid var(--mauve-light);border-radius:14px;margin-bottom:14px;overflow:hidden}
.result-card-header{padding:12px 18px;border-bottom:1px solid var(--mauve-light)}
.result-card-label{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--mauve-mid)}
.result-card-body{padding:14px 18px}
.result-list{list-style:none;padding:0;margin:0}
.result-list li{font-size:13px;color:var(--text-mid);line-height:1.6;padding:4px 0;padding-left:16px;position:relative}
.result-list li::before{content:'›';position:absolute;left:0;color:var(--mauve-mid);font-weight:500}
.reframe{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--mauve-dark);text-align:center;padding:18px 20px;background:var(--mauve-pale);border-radius:10px;border:1px solid var(--mauve-light);margin-bottom:14px;line-height:1.6}
.first-step{background:var(--mauve-pale);border:1px solid var(--mauve-light);border-radius:14px;padding:18px 20px;margin-bottom:20px}
.first-step-label{font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--mauve-mid);margin-bottom:10px}
.first-step-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--mauve-dark);margin-bottom:10px}
.step-item{font-size:13px;color:var(--text-mid);padding:5px 0;padding-left:18px;position:relative;line-height:1.5}
.step-item::before{content:'→';position:absolute;left:0;color:var(--mauve-dark);font-weight:500}
.email-capture-wrap{margin-bottom:20px}
.email-cta-box{background:var(--mauve-dark);border-radius:16px;padding:28px 24px;text-align:center;margin-bottom:14px}
.email-cta-eyebrow{font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--mauve-light);margin-bottom:10px}
.email-cta-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#FAF6F1;margin-bottom:8px}
.email-cta-body{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--mauve-light);margin-bottom:20px;line-height:1.5}
.email-cta-btn{display:inline-block;background:var(--cream);color:var(--mauve-dark);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;padding:14px 32px;border-radius:40px;text-decoration:none;transition:all 0.2s;cursor:pointer;border:none}
.email-cta-btn:hover{background:#fff;transform:translateY(-1px)}
.print-btn{display:flex;align-items:center;gap:14px;background:var(--mauve-pale);border:1px solid var(--mauve-light);border-radius:12px;padding:16px 20px;margin-bottom:20px;text-decoration:none;cursor:pointer;width:100%;transition:background 0.2s,border-color 0.2s}
.print-btn:hover{background:var(--mauve-light);border-color:var(--mauve-mid)}
.print-icon{width:36px;height:36px;background:var(--mauve-dark);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.print-text-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--mauve-dark);display:block;margin-bottom:3px}
.print-text-sub{font-size:10px;font-weight:400;color:var(--text-light);letter-spacing:0.08em;text-transform:uppercase}
.cta-section{background:var(--mauve-dark);border-radius:16px;padding:32px 24px;text-align:center;margin-bottom:28px}
.cta-eyebrow{font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--mauve-light);margin-bottom:10px}
.cta-title{font-family:'Playfair Display',serif;font-size:clamp(17px,4vw,22px);font-weight:700;color:#FAF6F1;line-height:1.3;margin-bottom:10px}
.cta-body{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--mauve-light);line-height:1.6;margin-bottom:22px;max-width:380px;margin-left:auto;margin-right:auto}
.cta-btn{display:inline-block;background:var(--cream);color:var(--mauve-dark);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;padding:14px 32px;border-radius:40px;text-decoration:none;transition:all 0.2s}
.cta-btn:hover{background:#fff;transform:translateY(-1px)}
.restart-btn{display:block;margin:0 auto;background:none;border:none;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--mauve-mid);cursor:pointer;padding:8px 0}
.restart-btn:hover{color:var(--mauve-dark)}
.footer{text-align:center;padding:24px 20px;font-size:11px;color:var(--text-light);border-top:1px solid var(--mauve-light)}
.footer span{color:var(--mauve-mid)}
.hidden{display:none}

@media print {
  .hero::before,.nav-row,.restart-btn,.email-capture-wrap,.cta-section,.footer{display:none!important}
  .hero{padding:20px 24px}
  body{background:#fff}
  .container{padding:20px}
  .result-card,.first-step,.reframe{break-inside:avoid}
  .cta-section{display:none!important}
}
</style>
</head>
<body>

<div class="hero">
  <p class="hero-eyebrow">Stress Integrated Strength System™ · Coach Paris</p>
  <h1 class="hero-title">The Fuel Check™</h1>
  <p class="hero-sub">Are you eating enough to support your body and your goals? Let's find out.</p>
</div>

<div class="container">
  <div id="quiz-wrap">
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Your fuel check</span>
        <span id="progress-text">Question 1 of 12</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    </div>
    <div id="question-area"></div>
    <div class="nav-row">
      <button class="btn btn-secondary" id="back-btn" onclick="goBack()" style="visibility:hidden">Back</button>
      <button class="btn btn-primary" id="next-btn" onclick="goNext()" disabled>Next</button>
    </div>
  </div>
  <div id="result-wrap-outer" class="hidden"></div>
</div>

<div class="footer">
  <span>@Coach_Paris · @Passports2Paris</span> &nbsp;|&nbsp; Stress Integrated Strength System™
</div>

<script>
const FLODESK_URL='https://coachparis.myflodesk.com/cctny7zblt';
const CONSULT_URL='https://schedule.fillout.com/t/uFpHY18tTous';
const STORAGE_KEY='cp_fuelcheck_email_submitted';

const questions=[
  {id:'goal',num:'01',text:'What is your primary goal with eating?',note:'This helps us understand your current mindset around food.',type:'single',options:['Weight loss','Maintenance','Performance / energy','General health']},
  {id:'meals',num:'02',text:'How many meals or eating occasions do you have per day?',type:'single',options:['1 meal','2 meals','3 meals','4+ meals or snacks throughout the day']},
  {id:'portions',num:'03',text:'How would you describe your portion sizes?',type:'single',options:['Very small — I keep them minimal','Small to moderate','Moderate and satisfying','I eat until I feel full']},
  {id:'satisfied',num:'04',text:'After eating, how often do you feel fully satisfied?',type:'single',options:['Rarely','Sometimes','Often','Always']},
  {id:'still_hungry',num:'05',text:'Do you ever stop eating even though you\'re still hungry?',note:'This one takes honesty — there\'s no wrong answer.',type:'single',options:['Often','Sometimes','Rarely','Never']},
  {id:'skip_meals',num:'06',text:'Do you often skip meals — intentionally or unintentionally?',type:'single',options:['Yes, frequently','Sometimes','Rarely','Never']},
  {id:'gap',num:'07',text:'How long do you typically go between meals?',type:'single',options:['6+ hours','4–6 hours','3–4 hours','Less than 3 hours']},
  {id:'fasted',num:'08',text:'Do you train fasted or skip eating around your workouts?',type:'single',options:['Yes, always','Sometimes','Rarely','No, I always fuel around training']},
  {id:'mindset',num:'09',text:'Which statement feels most true for you?',note:'Choose the one that resonates, even if it\'s uncomfortable.',type:'single',options:['I try to eat less to stay on track','I worry about eating too much','I try to be mindful but balanced','I don\'t think much about it']},
  {id:'increase',num:'10',text:'How do you feel about increasing your food intake?',type:'single',options:['Uncomfortable / resistant','Unsure but open','Comfortable','Already doing so']},
  {id:'energy',num:'11',text:'How would you describe your energy levels throughout the day?',type:'single',options:['Consistently low or crashing','Up and down — unpredictable','Mostly steady with dips','Strong and consistent']},
  {id:'symptoms',num:'12',text:'Are you experiencing any of these? Select all that apply.',note:'These are common signs the body isn\'t getting enough fuel.',type:'multi',options:['Brain fog or poor concentration','Poor workout recovery','Feeling cold often','Mood swings or irritability','Hair thinning or loss','Results have plateaued','Constantly thinking about food','Fatigue that training makes worse','None of the above']}
];

const results={
  1:{
    accentColor:'#7a5c6e',barBg:'linear-gradient(90deg,#7a5c6e,#9e7a8e)',
    eyebrow:'Result 1 of 4',title:'Under-Fueled & Depleted',
    tagline:'Your current fueling does not support your capacity.',
    intro:'Right now, your body is operating with limited resources.',
    youMay:['Skipping meals or eating infrequently','Underestimating how much fuel you actually need','Trying to maintain control through eating less'],
    leadsTo:['Low energy','Inconsistent performance','Slower recovery','Increased stress on the body'],
    reframe:'This isn\'t a discipline issue. It\'s a support issue. Your body cannot consistently perform, recover, or build when it is under-fueled.',
    youNeed:['Consistent meal structure','Predictable intake','Reduced pressure around food','Support before restriction'],
    stepTitle:'Start with minimums, not perfection.',
    steps:['Aim for 2–3 meals per day','Add one structured snack','Focus on consistency before optimisation'],
    ctaLabel:'Your next step',ctaTitle:'Start your Reset & Rebuild™',
    ctaBody:'At $17, Reset & Rebuild™ will help you rebuild consistency, regulate your system, and create structure your body can actually sustain.',
    ctaBtn:'Start Reset & Rebuild™ — $17',ctaLink:CONSULT_URL
  },
  2:{
    accentColor:'#8a6a3a',barBg:'linear-gradient(90deg,#8a6a3a,#b8934a)',
    eyebrow:'Result 2 of 4',title:'Inconsistent Fueling',
    tagline:'Your fueling is not consistent enough to support your capacity.',
    intro:'You\'re not necessarily under-eating all the time — but your intake lacks structure.',
    youMay:['Eat well some days and not others','Skip meals when busy or stressed','Rely on "catching up" later'],
    leadsTo:['Fluctuating energy','Unpredictable performance','Inconsistent recovery'],
    reframe:'Consistency will stabilise your energy and improve your capacity. Your body thrives on rhythm — not perfection.',
    youNeed:['Rhythm','Structure','Predictability'],
    stepTitle:'Anchor your eating pattern.',
    steps:['Anchor your day with 2 consistent meals','Add a third touchpoint — meal or snack','Reduce long gaps between eating'],
    ctaLabel:'Your next step',ctaTitle:'Let\'s build your structure together',
    ctaBody:'A consultation with Coach Paris will help you create a fueling rhythm that works around your real life — not an ideal version of it.',
    ctaBtn:'Book Your Consultation →',ctaLink:CONSULT_URL
  },
  3:{
    accentColor:'#9e703e',barBg:'linear-gradient(90deg,#9e703e,#b8934a)',
    eyebrow:'Result 3 of 4',title:'Minimally Fueled but Functional',
    tagline:'You\'re fueling enough to function — but not enough to fully progress.',
    intro:'You have a baseline level of structure, but there is still room to better support your body.',
    youMay:['Eat regularly but keep portions low','Prioritise "eating clean" over eating enough','Hesitate to increase intake'],
    leadsTo:['Slower progress','Limited strength gains','Plateaued results'],
    reframe:'There is a difference between functioning and thriving. You deserve the fuel to do both.',
    youNeed:['Slightly increased intake','Better alignment with training demands','Permission to support your body more'],
    stepTitle:'More is not the enemy.',
    steps:['Add slightly more to 1–2 meals per day','Support training days with more fuel','Focus on adequacy, not restriction'],
    ctaLabel:'Your next step',ctaTitle:'Let\'s optimise your fueling',
    ctaBody:'A consultation with Coach Paris will help you understand exactly how much more your body needs — without overwhelm or guesswork.',
    ctaBtn:'Book Your Consultation →',ctaLink:CONSULT_URL
  },
  4:{
    accentColor:'#4a7a5c',barBg:'linear-gradient(90deg,#4a7a5c,#6b8e72)',
    eyebrow:'Result 4 of 4',title:'Well-Fueled & Supportive',
    tagline:'Your fueling supports your current capacity.',
    intro:'You have built a strong foundation for your body.',
    youMay:['Consistent intake','Structured eating patterns','A good relationship with fuelling your body'],
    leadsTo:['Stable energy','Better recovery','More consistent performance'],
    reframe:'Well done. Consistency is one of the most powerful things you can do for your body. Now let\'s refine.',
    youNeed:['Refinement','Alignment with training intensity','Continued consistency'],
    stepTitle:'Keep building on what\'s working.',
    steps:['Adjust intake based on training demand','Continue supporting recovery','Maintain your current structure'],
    ctaLabel:'Ready to go deeper?',ctaTitle:'Let\'s refine your approach',
    ctaBody:'A consultation with Coach Paris will help you align your fueling precisely with your training demands and long-term goals.',
    ctaBtn:'Book Your Consultation →',ctaLink:CONSULT_URL
  }
};

const answers={};let current=0;

function renderQuestion(){
  const q=questions[current];
  const pct=Math.round((current/questions.length)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent='Question '+(current+1)+' of '+questions.length;
  let html='<div class="question-card">';
  html+='<p class="q-num">Question '+q.num+'</p>';
  html+='<p class="q-text">'+q.text+'</p>';
  if(q.note)html+='<p class="q-note">'+q.note+'</p>';
  if(q.type==='single'){
    html+='<div class="options">';
    q.options.forEach((opt,i)=>{
      const sel=answers[q.id]===i?' selected':'';
      html+='<div class="option'+sel+'" onclick="selectOption('+i+')">';
      html+='<div class="option-dot"></div><span class="option-text">'+opt+'</span></div>';
    });
    html+='</div>';
  } else {
    html+='<p class="multi-note">Select all that apply</p>';
    q.options.forEach((opt,i)=>{
      const s=(answers[q.id]||[]).includes(i)?' selected':'';
      html+='<div class="checkbox-option'+s+'" onclick="toggleCheckbox('+i+')">';
      html+='<div class="checkbox-box"><div class="checkmark"></div></div>';
      html+='<span class="option-text">'+opt+'</span></div>';
    });
  }
  html+='</div>';
  document.getElementById('question-area').innerHTML=html;
  document.getElementById('back-btn').style.visibility=current>0?'visible':'hidden';
  const has=q.type==='multi'?(answers[q.id]&&answers[q.id].length>0):answers[q.id]!==undefined;
  document.getElementById('next-btn').disabled=!has;
  document.getElementById('next-btn').textContent=current===questions.length-1?'See my result':'Next';
}

function selectOption(i){answers[questions[current].id]=i;renderQuestion();}

function toggleCheckbox(i){
  const q=questions[current];
  if(!answers[q.id])answers[q.id]=[];
  const idx=answers[q.id].indexOf(i);
  if(idx>-1)answers[q.id].splice(idx,1);else answers[q.id].push(i);
  renderQuestion();
}

function goNext(){if(current<questions.length-1){current++;renderQuestion();}else showResult();}
function goBack(){if(current>0){current--;renderQuestion();}}

function calcZone(){
  let s=0;const a=answers;
  if(a.goal===0)s+=2;else if(a.goal===1)s+=1;
  if(a.meals===0)s+=3;else if(a.meals===1)s+=2;else if(a.meals===2)s+=1;
  if(a.portions===0)s+=3;else if(a.portions===1)s+=2;else if(a.portions===2)s+=1;
  if(a.satisfied===0)s+=3;else if(a.satisfied===1)s+=2;else if(a.satisfied===2)s+=1;
  if(a.still_hungry===0)s+=3;else if(a.still_hungry===1)s+=2;else if(a.still_hungry===2)s+=1;
  if(a.skip_meals===0)s+=3;else if(a.skip_meals===1)s+=2;else if(a.skip_meals===2)s+=1;
  if(a.gap===0)s+=3;else if(a.gap===1)s+=2;else if(a.gap===2)s+=1;
  if(a.fasted===0)s+=2;else if(a.fasted===1)s+=1;
  if(a.mindset===0)s+=3;else if(a.mindset===1)s+=2;else if(a.mindset===2)s+=1;
  if(a.increase===0)s+=2;else if(a.increase===1)s+=1;
  if(a.energy===0)s+=3;else if(a.energy===1)s+=2;else if(a.energy===2)s+=1;
  const sc=(a.symptoms||[]).includes(8)?0:(a.symptoms||[]).length;
  s+=Math.min(sc*2,8);
  if(s>=24)return 1;if(s>=16)return 2;if(s>=8)return 3;return 4;
}

function list(items){return items.map(i=>'<li>'+i+'</li>').join('');}

function renderEmailCapture(){
  const hasSubmitted=localStorage.getItem(STORAGE_KEY);
  if(!hasSubmitted){
    return '<div class="email-cta-box">'+
      '<p class="email-cta-eyebrow">Save your results</p>'+
      '<p class="email-cta-title">Get your personalised results in your inbox</p>'+
      '<p class="email-cta-body">Enter your email and we\'ll send your Fuel Check™ results — plus your free printable — straight to you.</p>'+
      '<button class="email-cta-btn" onclick="handleEmailCTA()">Send Me My Results →</button>'+
      '</div>';
  } else {
    return '<button class="print-btn" onclick="window.print()">'+
      '<div class="print-icon"><svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg></div>'+
      '<div><span class="print-text-title">Download / Print Your Results</span>'+
      '<span class="print-text-sub">Save as PDF · Keep for reference</span></div>'+
      '</button>';
  }
}

function handleEmailCTA(){
  localStorage.setItem(STORAGE_KEY,'true');
  window.open(FLODESK_URL,'_blank');
  const wrap=document.getElementById('email-capture-wrap');
  if(wrap)wrap.innerHTML=renderEmailCapture();
}

function showResult(){
  const zone=calcZone();
  const r=results[zone];
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-text').textContent='Complete';

  let html='';
  html+='<div style="background:#fff;border:1px solid var(--mauve-light);border-radius:14px;overflow:hidden;margin-bottom:14px;">';
  html+='<div style="height:5px;background:'+r.barBg+'"></div>';
  html+='<div style="padding:24px 22px 20px;">';
  html+='<p style="font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:'+r.accentColor+';margin-bottom:10px;">'+r.eyebrow+'</p>';
  html+='<div style="font-family:\'Playfair Display\',serif;font-size:clamp(20px,4vw,26px);font-weight:700;color:'+r.accentColor+';margin-bottom:6px;line-height:1.2;">'+r.title+'</div>';
  html+='<div style="font-family:\'Cormorant Garamond\',serif;font-style:italic;font-size:16px;color:var(--text-light);margin-bottom:14px;line-height:1.5;">'+r.tagline+'</div>';
  html+='<p style="font-size:13px;color:var(--text-mid);line-height:1.75;">'+r.intro+'</p>';
  html+='</div></div>';

  html+='<div class="result-card"><div class="result-card-header"><p class="result-card-label">You may be</p></div><div class="result-card-body"><ul class="result-list">'+list(r.youMay)+'</ul></div></div>';
  html+='<div class="result-card"><div class="result-card-header"><p class="result-card-label">This often leads to</p></div><div class="result-card-body"><ul class="result-list">'+list(r.leadsTo)+'</ul></div></div>';
  html+='<div class="reframe">'+r.reframe+'</div>';
  html+='<div class="result-card"><div class="result-card-header"><p class="result-card-label">What you need right now</p></div><div class="result-card-body"><ul class="result-list">'+list(r.youNeed)+'</ul></div></div>';
  html+='<div class="first-step"><p class="first-step-label">Your first step</p><p class="first-step-title">'+r.stepTitle+'</p>';
  r.steps.forEach(s=>{html+='<div class="step-item">'+s+'</div>';});
  html+='</div>';

  html+='<div class="email-capture-wrap" id="email-capture-wrap">'+renderEmailCapture()+'</div>';

  html+='<div class="cta-section">';
  html+='<p class="cta-eyebrow">'+r.ctaLabel+'</p>';
  html+='<h2 class="cta-title">'+r.ctaTitle+'</h2>';
  html+='<p class="cta-body">'+r.ctaBody+'</p>';
  html+='<a class="cta-btn" href="'+r.ctaLink+'" target="_blank" rel="noopener">'+r.ctaBtn+'</a>';
  html+='</div>';
  html+='<button class="restart-btn" onclick="restartQuiz()">↺ &nbsp; Retake the check</button>';

  document.getElementById('quiz-wrap').classList.add('hidden');
  const rw=document.getElementById('result-wrap-outer');
  rw.innerHTML=html;
  rw.classList.remove('hidden');
}

function restartQuiz(){
  Object.keys(answers).forEach(k=>delete answers[k]);
  current=0;
  document.getElementById('quiz-wrap').classList.remove('hidden');
  const rw=document.getElementById('result-wrap-outer');
  rw.classList.add('hidden');
  rw.innerHTML='';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
